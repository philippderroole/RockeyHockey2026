<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIRockyHockey</title>

    <link href="style/bootstrap.min.css" rel="stylesheet">
    <link href="style/styles.css" rel="stylesheet">

    <script src="script/script.js" defer></script>
</head>

<body class="pb-2">

    <div>
        <audio id="backgroundAudio" src="resources/sounds/backgroundsound.wav" loop autoplay></audio>
        <audio id="startAudio" src="resources/sounds/prepare.wav"></audio>
        <audio id="countdownAudio" src="resources/sounds/countdown.mp3"></audio>
        <audio id="doublepointsAudio" src="resources/sounds/doublepoints.wav"></audio>
        <audio id="goalAudio" src=""></audio>
    </div>

    <div>
        <video id="idleVideo"      class="background-video" src="resources/videos/background.mp4" preload="auto" muted style="display:none"></video>
        <video id="leftGoalVideo"  class="background-video" src="resources/videos/left.mp4" preload="auto" muted style="display:none"></video>
        <video id="rightGoalVideo" class="background-video" src="resources/videos/right.mp4"  preload="auto" muted style="display:none"></video>
        <video id="loadingVideo"   class="background-video" src="resources/videos/loading.mp4" loop autoplay muted></video>
    </div>

    <div class="countdown-wrap" id="countdownContainer">
        <div id="number">3</div>
        <svg id="countdownSvg" width="150" height="150">
            <circle id="circle-bg" cx="150"cy="150" r="120"></circle>
            <circle id="circle" cx="150"cy="150" r="120"></circle>
        </svg>
    </div>

    <div id="scale">
        <div id="background-container">
            <img id="background-image" src="resources/imgs/Spielstandanzeige_EM.png" alt="Background Image">

            <input disabled id="countdown" placeholder="10:00">

            <input disabled id="scoreRoboter">
            <input disabled id="scoreSpieler">

            <div id="event-logo" class="event-circle">
                <h1>2x</h1>
                <p>Points</p>
            </div>

            <button id="startButton" onclick="startGame()" type="button"
                class="btn btn-light start-stop-button fs-1"><strong>Start</strong></button>

            <button id="stopButton" onclick="stopGame()" type="button"
                class="btn btn-light start-stop-button fs-1"><strong>Stop</strong></button>

            <label id="robot-label">RH 2026</label>
            <label id="prof-label">PROF</label>

        </div>
    </div>

    <div id="gifDisplay">
        <img id="score-gif" src="" alt="Tor-GIF">
    </div>

    <div id="event-overlay">
        <div class="event-banner">
            <h1>2x Points</h1>
        </div>
    </div>
</body>

</html>
